<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Taste Match</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
  :root { --green: #1DB954; --dark: #0a0a0a; --card: #141414; --border: #222; --muted: #555; --text: #eee; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; padding: 24px 16px 48px; }
  header { text-align: center; margin-bottom: 32px; }
  header h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(1.8rem, 6vw, 3rem); letter-spacing: -1px; color: #fff; }
  header h1 span { color: var(--green); }
  header p { color: var(--muted); font-size: 0.75rem; margin-top: 6px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .step { font-size: 0.7rem; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }
  .step strong { color: var(--text); }
  .btn { width: 100%; background: var(--green); color: #000; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; padding: 13px; cursor: pointer; transition: opacity 0.2s; margin-top: 4px; }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.secondary { background: transparent; color: var(--green); border: 1px solid var(--green); margin-top: 10px; }
  .status { text-align: center; font-size: 0.75rem; color: var(--muted); margin: 16px 0; min-height: 18px; }
  .status.error { color: #e74c3c; }
  .status.success { color: var(--green); }
  .match-banner { background: linear-gradient(135deg, #0f2a1a, #112b1a); border: 1px solid #1a4a2a; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 12px; }
  .match-banner .pct { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 3.5rem; color: var(--green); line-height: 1; }
  .match-banner .label { font-size: 0.7rem; color: #4a9a6a; margin-top: 4px; text-transform: uppercase; letter-spacing: 2px; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
  .stat-card .num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; color: #fff; }
  .stat-card .lbl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.65rem; padding: 8px 4px; cursor: pointer; text-align: center; transition: all 0.2s; }
  .tab.active { background: var(--green); border-color: var(--green); color: #000; font-weight: 700; }
  .artist-list { display: flex; flex-direction: column; gap: 8px; }
  .artist-chip { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: var(--text); }
  .artist-chip.shared { border-color: #1a4a2a; background: #0c1f14; }
  .artist-chip .idx { font-size: 0.65rem; color: var(--muted); min-width: 20px; }
  .artist-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .hidden { display: none; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #333; border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>Taste<span>Match</span></h1>
  <p>Compare public Spotify playlist artists</p>
</header>

<div id="step1" class="card">
  <div class="step">Log in with <strong>your</strong> Spotify account. Your friend's public playlists will be fetched without needing their login.</div>
  <button class="btn" onclick="startLogin()">Login with Spotify</button>
</div>

<div id="step2" class="card hidden">
  <div class="step">✅ <strong>Logged in!</strong> Tap below to analyze 7 of your playlists vs 14 of your friend's.</div>
  <button class="btn" id="analyzeBtn" onclick="analyze()">Analyze Taste Match</button>
  <button class="btn secondary" onclick="logout()">Log out / Switch account</button>
</div>

<div class="status" id="status"></div>
<div id="results" class="hidden"></div>

<script>
  const CLIENT_ID = 'c4ad0a57eccd458db75a668e46e8feff';
  const SCOPES = 'playlist-read-private playlist-read-collaborative';

  const USER1_PLAYLISTS = [
    '3Hr2Gw2IGhRJ6WhwOyf1xf',
    '1kCMSEw1nQqjyYCFqacbiH',
    '3857E5ntqRFZvzJcZUrSzo',
    '62DIk1x6PUsumhmVdWRn5g',
    '4XYPfmfM7IHm0YqVOHXtK3',
    '712YAKvHzX32IsdloaFBVd',
    '5rEx85Jp158QBMFhv1DJx0',
  ];

  const USER2_PLAYLISTS = [
    '5IucLpug0pi4a2IhdihC8F',
    '7wtW46A9Zkt92cvgR9XJhE',
    '6u0B0q4zfq7swXwXZv2t5y',
    '3Ep3nWF8UVfX9ieFmdYplP',
    '1IKWlsZMje3hgt6hUDw4eH',
    '0iaqIGtBnIYthLfaQAKlbl',
    '1BzzKuGszLmMquiQ0tcnIi',
    '5rrNFQkbjAl4X37cEtrVCm',
    '691LDm9tek4yqO2fJH4K3I',
    '7xsz5BPZ1WaykjLu7IDboZ',
    '2QECfTJMjsiLAAcEThwuPD',
    '3nTxSXB6ke3HWEmnQzXCOt',
    '131cxQvtwZeEEB7albtIFl',
    '3SvCYBzWZv5PCK3uiN3qLy',
  ];

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.innerHTML = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  function generateRandomString(length) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    const arr = new Uint8Array(length);
    crypto.getRandomValues(arr);
    return Array.from(arr).map(b => chars[b % chars.length]).join('');
  }

  async function generateCodeChallenge(verifier) {
    const data = new TextEncoder().encode(verifier);
    const digest = await crypto.subtle.digest('SHA-256', data);
    return btoa(String.fromCharCode(...new Uint8Array(digest)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  async function startLogin() {
    const verifier = generateRandomString(64);
    const challenge = await generateCodeChallenge(verifier);
    sessionStorage.setItem('pkce_verifier', verifier);
    const redirectUri = window.location.origin + window.location.pathname;
    sessionStorage.setItem('redirect_uri', redirectUri);
    const params = new URLSearchParams({
      client_id: CLIENT_ID, response_type: 'code',
      redirect_uri: redirectUri, code_challenge_method: 'S256',
      code_challenge: challenge, scope: SCOPES,
    });
    window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
  }

  async function handleCallback() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    if (error) { setStatus('Spotify login cancelled.', 'error'); return; }
    if (!code) return;
    window.history.replaceState({}, '', window.location.pathname);
    const verifier = sessionStorage.getItem('pkce_verifier');
    const redirectUri = sessionStorage.getItem('redirect_uri');
    if (!verifier) { setStatus('Session expired. Please try again.', 'error'); return; }
    setStatus('<span class="spinner"></span>Logging in...');
    try {
      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'authorization_code', code, redirect_uri: redirectUri, code_verifier: verifier })
      });
      const data = await res.json();
      if (!data.access_token) throw new Error(data.error_description || 'Token exchange failed.');
      sessionStorage.setItem('access_token', data.access_token);
      sessionStorage.removeItem('pkce_verifier');
      setStatus('');
      showStep2();
    } catch (err) { setStatus('❌ ' + err.message, 'error'); }
  }

  function showStep2() {
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
  }

  function logout() {
    sessionStorage.clear();
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step1').classList.remove('hidden');
    document.getElementById('results').classList.add('hidden');
    setStatus('');
  }

  async function fetchPlaylistArtists(playlistId, token) {
    let artists = new Set();
    let url = `https://api.spotify.com/v1/playlists/${playlistId}/tracks?limit=100&fields=next,items(track(artists(name)))`;
    let attempts = 0;
    while (url && attempts < 20) {
      attempts++;
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) {
        const text = await res.text();
        console.warn(`Playlist ${playlistId} failed: ${res.status} ${text}`);
        break;
      }
      const data = await res.json();
      (data.items || []).forEach(item => {
        (item?.track?.artists || []).forEach(a => { if (a?.name) artists.add(a.name); });
      });
      url = data.next;
    }
    return artists;
  }

  async function getAnonToken() {
    // Try to get an anonymous token from Spotify's web player
    const res = await fetch('https://open.spotify.com/get_access_token?reason=transport&productType=web_player', {
      headers: { 'App-Platform': 'WebPlayer' }
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.accessToken || null;
  }

  async function analyze() {
    const userToken = sessionStorage.getItem('access_token');
    if (!userToken) { setStatus('Please log in first.', 'error'); return; }
    document.getElementById('results').classList.add('hidden');
    document.getElementById('analyzeBtn').disabled = true;

    try {
      // Try to get anon token for friend's public playlists
      setStatus('<span class="spinner"></span>Getting public access token...');
      let friendToken = await getAnonToken();
      
      // Fall back to user token if anon fails
      if (!friendToken) {
        console.log('Anon token failed, using user token for friend playlists');
        friendToken = userToken;
      }

      let artists1 = new Set(), artists2 = new Set();

      for (let i = 0; i < USER1_PLAYLISTS.length; i++) {
        setStatus(`<span class="spinner"></span>Scanning your playlist ${i+1}/${USER1_PLAYLISTS.length}...`);
        const a = await fetchPlaylistArtists(USER1_PLAYLISTS[i], userToken);
        a.forEach(x => artists1.add(x));
      }

      for (let i = 0; i < USER2_PLAYLISTS.length; i++) {
        setStatus(`<span class="spinner"></span>Scanning friend's playlist ${i+1}/${USER2_PLAYLISTS.length}...`);
        const a = await fetchPlaylistArtists(USER2_PLAYLISTS[i], friendToken);
        a.forEach(x => artists2.add(x));
      }

      const shared = [...artists1].filter(a => artists2.has(a)).sort();
      const only1 = [...artists1].filter(a => !artists2.has(a)).sort();
      const only2 = [...artists2].filter(a => !artists1.has(a)).sort();
      const total = new Set([...artists1, ...artists2]).size;
      const matchPct = total > 0 ? Math.round((shared.length / total) * 100) : 0;

      const u1count = artists1.size;
      const u2count = artists2.size;

      setStatus(u2count === 0 ? '⚠️ Friend playlists returned 0 artists — they may be private.' : '', u2count === 0 ? 'error' : '');
      renderResults(shared, only1, only2, matchPct, u1count, u2count);

    } catch (err) {
      setStatus('❌ ' + err.message, 'error');
    } finally {
      document.getElementById('analyzeBtn').disabled = false;
    }
  }

  function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.querySelectorAll('.artist-section').forEach(s => s.classList.toggle('hidden', s.dataset.section !== tab));
  }

  function renderResults(shared, only1, only2, matchPct, u1count, u2count) {
    const el = document.getElementById('results');
    const chips = (arr, cls = '') => arr.length === 0
      ? '<p style="color:#444;font-size:0.75rem;padding:12px 0;">None found</p>'
      : arr.map((a, i) => `<div class="artist-chip ${cls}"><span class="idx">${String(i+1).padStart(2,'0')}</span>${cls ? '<span class="dot"></span>' : ''}<span>${a}</span></div>`).join('');
    el.innerHTML = `
      <div class="match-banner"><div class="pct">${matchPct}%</div><div class="label">Taste Match</div></div>
      <div class="stats-row">
        <div class="stat-card"><div class="num">${shared.length}</div><div class="lbl">Shared Artists</div></div>
        <div class="stat-card"><div class="num">${USER1_PLAYLISTS.length + USER2_PLAYLISTS.length}</div><div class="lbl">Playlists Scanned</div></div>
        <div class="stat-card"><div class="num">${u1count}</div><div class="lbl">Your Artists</div></div>
        <div class="stat-card"><div class="num">${u2count}</div><div class="lbl">Friend's Artists</div></div>
      </div>
      <div class="tabs">
        <div class="tab active" data-tab="shared" onclick="showTab('shared')">✦ Shared (${shared.length})</div>
        <div class="tab" data-tab="only1" onclick="showTab('only1')">You (${only1.length})</div>
        <div class="tab" data-tab="only2" onclick="showTab('only2')">Friend (${only2.length})</div>
      </div>
      <div class="artist-list">
        <div class="artist-section" data-section="shared">${chips(shared, 'shared')}</div>
        <div class="artist-section hidden" data-section="only1">${chips(only1)}</div>
        <div class="artist-section hidden" data-section="only2">${chips(only2)}</div>
      </div>`;
    el.classList.remove('hidden');
  }

  window.addEventListener('load', () => {
    const token = sessionStorage.getItem('access_token');
    if (token) { showStep2(); }
    else if (window.location.search.includes('code=')) { handleCallback(); }
  });
</script>
</body>
</html>
